name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run workspace checks
        run: bunx turbo run check --filter=!xlsmith-benchmark

      - name: Verify docs Twoslash
        run: bunx turbo run twoslash:verify --filter=xlsmith-docs

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: bun run release:version
          publish: bun run release:publish
          commit: "chore(release): release packages"
          title: "chore(release): release packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
